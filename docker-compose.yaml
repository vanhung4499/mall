version: '3'
services:
  mall-mysql:
    image: mysql:5.7
    container_name: mall-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mall
      MYSQL_USER: mall
      MYSQL_PASSWORD: mall
    ports:
      - "3306:3306"

  mall-redis:
    image: redis:7.0
    container_name: mall-redis
    ports:
      - "6379:6379"