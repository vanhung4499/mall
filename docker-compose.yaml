version: '3'
services:
  mall-mysql:
    image: mysql:5.7
    container_name: mall-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mall
      MYSQL_USER: mall
      MYSQL_PASSWORD: mall
    ports:
      - "3306:3306"

  mall-redis:
    image: redis:7.0
    container_name: mall-redis
    ports:
      - "6379:6379"

  mall-mongodb:
    image: mongo:5.0
    container_name: mall-mongodb
    ports:
      - "27017:27017"

  mall-rabbitmq:
    image: rabbitmq:3.10.5-management
    container_name: mall-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: mall
      RABBITMQ_DEFAULT_PASS: mall
